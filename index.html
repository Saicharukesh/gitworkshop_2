<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff9800;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #e68900;
        }

        .weather-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .temperature {
            font-size: 60px;
            font-weight: bold;
            margin: 20px 0;
        }

        .weather-icon {
            font-size: 80px;
            margin: 20px 0;
        }

        .weather-description {
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-date {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }

        .detail-label {
            font-size: 11px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .forecast-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .forecast-day {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .forecast-day-name {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 30px;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Forecast</h1>
        </div>

        <div class="search-box">
            <input type="text" id="city" placeholder="Search for a city...">
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="weatherResult">
            <div class="weather-card">
                <div class="weather-icon">☁️</div>
                <div class="temperature">29°C</div>
                <div class="weather-description">Partly cloudy</div>
                <div class="weather-date">Monday, 04:30 PM</div>
                
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value">28°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">65%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value">12 km/h</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value">10 km</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value">5</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">1013 mb</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Dew Point</div>
                        <div class="detail-value">18°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Sunrise</div>
                        <div class="detail-value">5:45 AM</div>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <h2>Daily</h2>
                <div class="forecast" id="forecastContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // Mock data for weather
        const mockWeatherData = {
            current: {
                temp: 29,
                feelsLike: 28,
                description: "Partly cloudy",
                icon: "☁️",
                humidity: 65,
                windSpeed: 12,
                visibility: 10,
                uvIndex: 5,
                pressure: 1013,
                dewPoint: 18,
                sunrise: "5:45 AM"
            },
            forecast: [
                { day: "Mar 27", temp: 35, icon: "☀️" },
                { day: "Mar 28", temp: 33, icon: "⛅" },
                { day: "Mar 29", temp: 34, icon: "☀️" },
                { day: "Mar 2", temp: 34, icon: "☀️" },
                { day: "Mar 3", temp: 34, icon: "☀️" },
                { day: "Mar 4", temp: 34, icon: "☀️" },
                { day: "Mar 5", temp: 33, icon: "⛅" }
            ]
        };

        function displayWeather(data) {
            const weatherResult = document.getElementById("weatherResult");
            const current = data.current;

            weatherResult.innerHTML = `
                <div class="weather-card">
                    <div class="weather-icon">${current.icon}</div>
                    <div class="temperature">${current.temp}°C</div>
                    <div class="weather-description">${current.description}</div>
                    <div class="weather-date">Monday, 04:30 PM</div>
                    
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${current.feelsLike}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${current.windSpeed} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${current.visibility} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">${current.uvIndex}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${current.pressure} mb</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Dew Point</div>
                            <div class="detail-value">${current.dewPoint}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Sunrise</div>
                            <div class="detail-value">${current.sunrise}</div>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h2>Daily</h2>
                    <div class="forecast" id="forecastContainer"></div>
                </div>
            `;

            displayForecast(data.forecast);
        }

        function displayForecast(forecast) {
            const forecastContainer = document.getElementById("forecastContainer");
            forecastContainer.innerHTML = forecast.map(day => `
                <div class="forecast-day">
                    <div class="forecast-day-name">${day.day}</div>
                    <div class="forecast-icon">${day.icon}</div>
                    <div class="forecast-temp">${day.temp}°</div>
                </div>
            `).join("");
        }

        function getWeather() {
            // Using mock data for now
            displayWeather(mockWeatherData);
        }

        // Display mock data on page load
        window.addEventListener('load', function() {
            displayWeather(mockWeatherData);
        });
    </script>

</body>
</html>
